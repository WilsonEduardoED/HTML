<!DOCTYPE html>
<html lang="pt">
<head>

    <title>Modelos de Caixas </title>

<style>

h1{

    background-color: lightgray;
    height: 300px;
    width: 300px;

    padding-bottom: 10px;

}

    a{

        border-width: 5px;
        border-style: dotted;
        border-color: rgb(151, 151, 236);

        padding-bottom: 10px;
        padding-left: 10px;
        padding-right: 10px;
        padding-top: 10px;

    }



</style>

</head>
<body>
    
    <h1>Exemplo de Caixa Box-Level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">Links são exemplos de inline-level</a>. Vamos ver como isso funciona</p>
